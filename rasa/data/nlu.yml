- intent: inform_required_course # 필수 과목 알림
  examples: |
    - [자료구조](course_name_entity) 꼭 들어야해
    - [객체지향프로그래밍](course_name_entity)은 필수야
    - [데이터베이스](course_name_entity) 포함해줘
    - [알고리즘](course_name_entity) 넣어줘
    - [인공지능](course_name_entity) 과목이 꼭 필요해
    - [운영체제](course_name_entity)와 [컴퓨터구조](course_name_entity) 과목은 필수
    - [확률과통계](course_name_entity) 빼고 다 상관없어
    - [웹프로그래밍](course_name_entity) 수업 꼭 넣어줘

- intent: inform_free_day # 공강 요일 알림
  examples: |
    - [수요일](free_day_entity)은 비워줘
    - [월요일](free_day_entity) 공강하고 싶어
    - [금공강](free_day_keyword_entity) 만들어줘
    - [화요일](free_day_entity)은 수업 없었으면 좋겠어
    - [목요일](free_day_entity) 비워줘
    - [월](free_day_entity)과 [수](free_day_entity)는 공강으로
    - [금요일](free_day_entity) 수업 없게 해줘

- intent: inform_avoid_time # 특정 시간 회피
  examples: |
    - [월요일](free_day_entity) [9시](time_entity) 수업 피해줘
    - [수요일](free_day_entity) [오전](time_range_entity)에는 수업 없게 해줘
    - [화](free_day_entity) [목](free_day_entity) [9시](time_entity) 피해서 짜줘
    - [금요일](free_day_entity) [오후](time_range_entity)는 비워줘
    - [월요일](free_day_entity) [1교시](time_entity) 수업 빼고
    - [오전](time_range_entity) 수업 피해서 시간표 만들어줘

- intent: modify_timetable # 시간표 수정 요청
  examples: |
    - 이 시간표에서 [데이터베이스](course_name_entity) 빼줘
    - [자료구조](course_name_entity) 대신 [알고리즘](course_name_entity) 넣어줘
    - [컴퓨터구조](course_name_entity) 과목을 다른 걸로 바꿔줘
    - 다른 시간표 보여줘
    - 시간표 다시 생성해줘
    - 다른 조합으로 시간표 만들어줘
    - 이 시간표 말고 다른거 보여줘

# 정규식 패턴 추가
- regex: credits_regex
  examples: |
    - \d+학점
    - \d+
    - 학점\d+
    - \d+점

# 엔티티 동의어 사용
- synonym: 교양
  examples: |
    - 교양
    - 교양학점
    - 교양과목
    - 교양 과목
    - 교양 수업

- synonym: 전공
  examples: |
    - 전공
    - 전공학점
    - 전공과목
    - 전공 과목
    - 전공 수업