# nlu.yml
version: "3.1"

nlu:
- intent: greet # 인사
  examples: |
    - 안녕
    - 안녕하세요
    - 하이
    - ㅎㅇ
    - 좋은 아침입니다
    - 만나서 반가워요

- intent: goodbye # 작별
  examples: |
    - 잘가
    - 안녕히가세요
    - 다음에 봐요
    - 바이
    - ㅂㅂ

- intent: affirm # 긍정
  examples: |
    - 네
    - 응
    - 맞아
    - 좋아요
    - 물론이죠

- intent: deny # 부정
  examples: |
    - 아니요
    - 아니
    - 싫어요
    - 별로예요

- intent: mood_great # 기분 좋음
  examples: |
    - 기분 최고예요
    - 너무 좋아요
    - 완벽해요

- intent: mood_unhappy # 기분 안좋음
  examples: |
    - 슬퍼요
    - 기분이 안 좋아요
    - 우울해요

- intent: bot_challenge # 봇인지 질문
  examples: |
    - 너 로봇이야?
    - 혹시 봇인가요?
    - 사람이에요?

- intent: request_timetable # 시간표 생성 요청
  examples: |
    - 시간표 만들어줘
    - 시간표 짜줘
    - 이번 학기 시간표 추천해줄래?
    - [컴퓨터공학과](department) 전공 [9학점](major_credits_entity) 듣고 교양은 [6학점](elective_credits_entity) 듣고싶어
    - [소프트웨어학부](department) 시간표 짜주는데, [자료구조](course_name_entity)랑 [운영체제](course_name_entity)는 꼭 넣고, [수요일](free_day_entity)은 공강으로 해줘
    - 전공 [12학점](major_credits_entity) 교양 [6학점](elective_credits_entity) 채워서 시간표 만들어줘. [금공강](free_day_keyword_entity)이면 좋겠어.
    - [월요일](free_day_entity) 비워주고 [알고리즘](course_name_entity) 포함해서 시간표 짜줘
    - [수업시간](course_name_entity) 찾아줘
    - 전공 [15학점](major_credits_entity) 교양 [3학점](elective_credits_entity) 시간표 생성해줘
    - [데이터베이스](course_name_entity)와 [인공지능](course_name_entity) 과목을 포함한 시간표를 만들어줘
    - [월요일](free_day_entity) [9시](time_entity)는 피해서 시간표 짜줘
    - [화요일](free_day_entity) [오후](time_range_entity) 수업은 빼고 시간표 만들어줘
    - [금요일](free_day_entity) 공강으로 전공 [9학점](major_credits_entity) 시간표 만들어줘
    - [자료구조](course_name_entity) 대신 [알고리즘](course_name_entity) 넣어서 시간표 다시 짜줘
    - 이 시간표에서 [확률과통계](course_name_entity) 빼고 다른 과목으로 바꿔줘
    - 전공 [9학점](major_credits_entity) [화공강](free_day_keyword_entity) 시간표 추천
    - [월](free_day_entity) [수](free_day_entity) 공강인 시간표 만들어줘
    - [디자인패턴](course_name_entity)과 [컴퓨터구조](course_name_entity) 포함해서 전공 [12학점](major_credits_entity) 시간표

